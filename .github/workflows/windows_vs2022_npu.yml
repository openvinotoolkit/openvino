name: Windows (VS 2022, Python 3.11, NPU)

# DEV/TEMPORARY workflow for bringing up NPU validation in isolation.

on:
  workflow_dispatch:
    inputs:
      target-branch:
        description: 'Target branch for the build; taken from event context by default'
        type: string
        required: false
      npu-platforms:
        description: 'JSON list of NPU platforms to compile for (offline), each on its own runner. e.g. ["3720","4000","5010","5020"]'
        type: string
        required: false
        default: '["3720","4000","5010","5020"]'
      model-scope:
        description: 'Scope of models for testing (pytest marker)'
        type: string
        required: false
        default: 'precommit'
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

concurrency:
  group: ${{ github.event_name == 'push' && github.run_id || github.ref }}-windows-npu
  cancel-in-progress: true

permissions: read-all

env:
  TARGET_BRANCH: ${{ inputs.target-branch || github.base_ref || github.event.merge_group.base_ref || github.ref }}
  PIP_CACHE_PATH: "C:\\mount\\caches\\pip\\win"
  PYTHON_VERSION: '3.11'

jobs:
  Smart_CI:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.run_attempt > 1
    outputs:
      affected_components: "${{ steps.smart_ci.outputs.affected_components }}"
      skip_workflow: "${{ steps.smart_ci.outputs.skip_workflow }}"
      target_branch: ${{ steps.set_target_branch.outputs.target_branch }}
    steps:
      - name: checkout action
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: .github/actions/smart-ci

      - name: Get affected components
        id: smart_ci
        uses: ./.github/actions/smart-ci
        with:
          repository: ${{ github.repository }}
          pr: ${{ github.event.number }}
          commit_sha: ${{ github.sha }}
          ref_name: ${{ github.ref_name }}
          component_pattern: "category: (.*)"
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          skip_when_only_listed_labels_set: 'docs'
          skip_when_only_listed_files_changed: '*.md,*.rst,*.png,*.jpg,*.svg,*/layer_tests_summary/*,*/conformance/*,.github/workflows/ci-doctor.lock.yml'

      - name: Get target branch
        id: set_target_branch
        run: |
          echo "target_branch=${TARGET_BRANCH#refs/heads/}" >> $GITHUB_OUTPUT

  Build:
    needs: [ Smart_CI ]
    if: "!needs.smart_ci.outputs.skip_workflow"
    uses: ./.github/workflows/job_build_windows.yml
    with:
      runner: 'aks-win-16-cores-32gb-build'
      affected-components: ${{ needs.smart_ci.outputs.affected_components }}
      build-type: 'Release'
      target-branch: ${{ needs.smart_ci.outputs.target_branch }}
      build-additional-python-wheels: true
      # NPU plugin is ON by default on WIN32 x86_64 (cmake/features.cmake:
      # ENABLE_INTEL_NPU), so the standard options already build the NPU plugin
      # and the compiler-in-plugin needed for offline compilation.
      cmake-options: >-
            -G 'Ninja Multi-Config'
            -DENABLE_PYTHON=ON
            -DENABLE_WHEEL=OFF
            -DENABLE_TESTS=ON
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
            -DENABLE_STRICT_DEPENDENCIES=OFF
            -DCMAKE_DISABLE_FIND_PACKAGE_PkgConfig=ON
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
            -DFETCHCONTENT_BASE_DIR="C:\fcc\ninja_multi_config"

  NPU_Models_Tests:
    name: NPU
    needs: [ Build, Smart_CI ]
    uses: ./.github/workflows/job_npu_tests.yml
    with:
      runner: 'aks-win-8-cores-16gb-test'
      affected-components: ${{ needs.smart_ci.outputs.affected_components }}
      npu-platforms: ${{ inputs.npu-platforms || '["3720","4000","5010","5020"]' }}
      model-scope: ${{ inputs.model-scope || 'precommit' }}

  Overall_Status:
    name: ci/gha_overall_status_windows_npu
    needs: [ Smart_CI, Build, NPU_Models_Tests ]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Check status of all jobs
        if: >-
          ${{
            contains(needs.*.result, 'failure') ||
            contains(needs.*.result, 'cancelled')
          }}
        run: exit 1

name: Linux GPU Plugin Level Zero (Battlemage/Arc-B50)

on:
  workflow_dispatch:
    inputs:
      target-branch:
        description: 'Target branch for the build; taken from event context by default'
        type: string
        required: false
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - '.github/workflows/dev_gpu_linux_level_zero.yml'
      - 'src/plugins/intel_gpu/**'

concurrency:
  group: ${{ github.event_name == 'push' && github.run_id || github.ref }}-linux-gpu-l0-dev
  cancel-in-progress: true

permissions: read-all

jobs:
  Smart_CI:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false || github.run_attempt > 1
    outputs:
      affected_components: "${{ steps.smart_ci.outputs.affected_components }}"
      changed_components: "${{ steps.smart_ci.outputs.changed_components }}"
      skip_workflow: "${{ steps.smart_ci.outputs.skip_workflow }}"
    steps:
      - name: checkout action
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: .github/actions/smart-ci

      - name: Get affected components
        id: smart_ci
        uses: ./.github/actions/smart-ci
        with:
          repository: ${{ github.repository }}
          pr: ${{ github.event.number }}
          commit_sha: ${{ github.sha }}
          ref_name: ${{ github.ref_name }}
          component_pattern: "category: (.*)"
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          skip_when_only_listed_labels_set: 'docs'
          skip_when_only_listed_files_changed: '*.md,*.rst,*.png,*.jpg,*.svg'

      - name: Show affected components
        run: |
          echo "${{ toJSON(steps.smart_ci.outputs.affected_components) }}"
        shell: bash

  Docker:
    needs: Smart_CI
    runs-on: aks-linux-4-cores-16gb-docker-build
    container:
      image: openvinogithubactions.azurecr.io/docker_build:0.2
      volumes:
        - /mount:/mount
    outputs:
      images: "${{ steps.handle_docker.outputs.images && steps.handle_docker.outputs.images || steps.mock_image.outputs.images }}"
    steps:
      - name: Set mock output images if pipeline should be skipped
        if: ${{ needs.smart_ci.outputs.skip_workflow == 'True' }}
        id: mock_image
        run: echo "images={\"ov_test\":{\"ubuntu_24_04_x64\":\"mock\"},\"ov_build\":{\"ubuntu_24_04_x64\":\"mock\"}}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ needs.smart_ci.outputs.skip_workflow != 'True' }}
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15

      - uses: ./.github/actions/handle_docker
        if: ${{ needs.smart_ci.outputs.skip_workflow != 'True' }}
        id: handle_docker
        with:
          images: |
            ov_build/ubuntu_24_04_x64
            ov_test/ubuntu_24_04_x64
          registry: 'openvinogithubactions.azurecr.io'
          dockerfiles_root_dir: '.github/dockerfiles'
          changed_components: ${{ needs.smart_ci.outputs.changed_components }}

  Build:
    needs: [Docker, Smart_CI]
    if: "!needs.smart_ci.outputs.skip_workflow"
    uses: ./.github/workflows/job_build_linux.yml
    with:
      runner: 'aks-linux-16-cores-32gb'
      image: ${{ fromJSON(needs.docker.outputs.images).ov_build.ubuntu_24_04_x64 }}
      affected-components: ${{ needs.smart_ci.outputs.affected_components }}
      event-name: ${{ github.event_name }}
      os: 'ubuntu_24_04'
      build-rpm-packages: false
      build-js: false
      build-debian-packages: true
      build-contrib: true
      build-additional-python-packages: true
      target-branch: ${{ inputs.target-branch }}
      cmake-options: >-
            -G 'Ninja Multi-Config'
            -DENABLE_NCC_STYLE=OFF
            -DENABLE_TESTS=ON
            -DENABLE_STRICT_DEPENDENCIES=OFF
            -DENABLE_SYSTEM_OPENCL=ON
            -DCMAKE_VERBOSE_MAKEFILE=ON
            -DCPACK_GENERATOR=TGZ
            -DCMAKE_COMPILE_WARNING_AS_ERROR=ON
            -DGPU_RT_TYPE=L0

  Test:
    needs: [ Build, Smart_CI ]
    if: "!needs.smart_ci.outputs.skip_workflow"
    timeout-minutes: 120
    runs-on:
      group: 'Intel-GPU'
      labels: [ 'self-hosted', 'dgpu', 'Arc-B50', 'Battlemage' ]
    container:
      image: ubuntu:24.04
      volumes:
        - /usr/local/share/ca-certificates:/usr/local/share/ca-certificates:ro
        - ${{ github.workspace }}:${{ github.workspace }}
      options: "--group-add 44 --group-add 993 --device /dev/dri/renderD129:/dev/dri/renderD129"
    defaults:
      run:
        shell: bash
    env:
      DEBIAN_FRONTEND: noninteractive
      INSTALL_DIR: ${{ github.workspace }}/install
      INSTALL_TEST_DIR: ${{ github.workspace }}/install/tests
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt

    steps:
      - name: Install Dependencies & L0 Driver
        run: |
          apt-get update
          apt-get install -y software-properties-common ca-certificates wget pigz python3
          add-apt-repository -y ppa:kobuk-team/intel-graphics
          apt-get update
          apt-get install -y libze-intel-gpu1 libze1 intel-metrics-discovery intel-opencl-icd clinfo intel-gsc \
            intel-media-va-driver-non-free libmfx-gen1 libvpl2 libvpl-tools libva-glx2 va-driver-all vainfo \
            libze-dev intel-ocloc libze-intel-gpu-raytracing

      - name: Download OpenVINO package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: openvino_package
          path: ${{ env.INSTALL_DIR }}

      - name: Download OpenVINO tests package
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3
        with:
          name: openvino_tests
          path: ${{ env.INSTALL_TEST_DIR }}

      - name: Extract OpenVINO packages
        run: |

          pushd ${INSTALL_DIR}
            pigz -dc openvino_package.tar.gz | tar -xf - -C ${INSTALL_DIR}
          popd

          pushd ${INSTALL_TEST_DIR}
            pigz -dc openvino_tests.tar.gz | tar -xf - -C ${INSTALL_DIR}
          popd

      - name: Setup Variables
        run: |
          echo "SETUPVARS_COMMAND=source ${INSTALL_DIR}/setupvars.sh" >> "$GITHUB_ENV"

      - name: Get gtest-parallel script
        run: wget https://raw.githubusercontent.com/google/gtest-parallel/master/gtest_parallel.py -O ${{ github.workspace }}/gtest_parallel.py

      - name: OpenVINO GPU Unit Tests (Level Zero)
        run: |
          ${SETUPVARS_COMMAND}
          export LD_LIBRARY_PATH=$LD_LIBRARY_PATH:${INSTALL_TEST_DIR}
          python3 ${{ github.workspace }}/gtest_parallel.py ${INSTALL_TEST_DIR}/ov_gpu_unit_tests \
            --dump_json_test_results=${INSTALL_TEST_DIR}/ov_gpu_unit_tests.json \
            -- \
            --report_unique_name \
            --gtest_filter=*fully_connected*

      - name: Upload Test Results
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: test-results-gpu-l0
          path: |
            ${{ env.INSTALL_TEST_DIR }}/*.json
            ${{ env.INSTALL_TEST_DIR }}/TEST-*.xml
          if-no-files-found: 'ignore'

name: Cleanup stale dependabot branches
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Only log branches that would be deleted, do not delete them'
        type: boolean
        required: false
        default: true
  schedule:
    # at 06:00 every day
    - cron: '0 6 * * *'
  # TEMPORARY (for testing on this PR): run a forced dry-run
  pull_request:
    paths:
      - '.github/workflows/cleanup_dependabot_branches.yml'
      - '.github/scripts/dependabot_cleanup/**'

permissions: read-all

jobs:
  Cleanup_Dependabot_Branches:
    name: Cleanup stale dependabot branches
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'openvinotoolkit' }}
    permissions:
      contents: write
    steps:
      - name: Checkout cleanup script
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: '.github/scripts/dependabot_cleanup'

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.13'

      - name: Install deps
        working-directory: ${{ github.workspace }}/.github/scripts/dependabot_cleanup
        run: pip3 install -r requirements.txt

      - name: Cleanup stale dependabot branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Scheduled runs perform real deletions. Manual runs honor the dry_run input (defaults to true).
          # Reads as: if event is 'schedule' -> set to 'false' (delete); else use dry_run that's true by default.
          # DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || inputs.dry_run }}
          # Only the daily schedule deletes for real. Manual runs honor the dry_run
          # checkbox (default true). Any other event (e.g. pull_request) is forced to
          # 'true' so it can never delete - it only previews.
          DRY_RUN: ${{ github.event_name == 'schedule' && 'false' || (github.event_name == 'workflow_dispatch' && inputs.dry_run || 'true') }}
        run: |
          python3 ${{ github.workspace }}/.github/scripts/dependabot_cleanup/cleanup_dependabot_branches.py \
            --repository-name ${GITHUB_REPOSITORY}

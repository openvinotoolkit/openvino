name: Code coverage
on:
  workflow_dispatch:
    inputs:
      test_profile:
        description: 'Hardware test profile'
        required: false
        default: cpu
        type: choice
        options:
          - cpu
          - cpu_gpu
          - cpu_npu
          - cpu_npu_gpu
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  Coverage:
    continue-on-error: true
    runs-on: ${{ matrix.config.os }}
    env:
      CMAKE_BUILD_TYPE: 'Release'
      PARALLEL_JOBS: '64'
      PYTEST_XDIST_WORKERS: '1'
      JS_TEST_CONCURRENCY: '1'
      TEST_PROFILE: ${{ github.event_name == 'workflow_dispatch' && inputs.test_profile || 'cpu' }}
      NODE_EXTRA_CA_CERTS: /usr/local/share/ca-certificates/IntelProxyRootCA-Base64.crt
    strategy:
      fail-fast: false
      matrix:
        config:
          - { name: "Ubuntu-gcc", os: ubuntu-latest-64-cores, cc: "gcc", cxx: "g++" }

    steps:
      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10.10'
          architecture: 'x64'

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: '22'

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@5ebbd400eff9e74630f759d94ddd7b6c26299639 # v1.2.20
        with:
          max-size: 50G

      - name: Clone OpenVINO
        uses: ababushk/checkout@9bec46a94a83db82acd4303e7627d88db71402a5 # cherry_pick_retries
        timeout-minutes: 15
        with:
          submodules: 'true'

      - name: Install dependencies
        run: bash ${{ github.workspace }}/scripts/coverage/install_deps.sh

      - name: Configure OpenVINO with CMake
        env:
          CC: ${{ matrix.config.cc }}
          CXX: ${{ matrix.config.cxx }}
        run: bash ${{ github.workspace }}/scripts/coverage/configure_ov.sh

      - name: Build and install coverage artifacts
        run: bash ${{ github.workspace }}/scripts/coverage/build_install.sh

      - name: Run selected C++ coverage tests
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/run_cpp_tests.sh

      - name: Run Python API/Frontend/Layer/OVC tests with coverage
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/run_python_tests.sh

      - name: Run Node.js bindings unit/e2e tests with coverage
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/run_js_tests.sh

      - name: Generate C/C++ coverage report
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/collect_cpp_coverage.sh

      - name: Coverage summary
        if: ${{ always() }}
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/write_summary.sh

      - name: Package coverage report
        if: ${{ always() }}
        continue-on-error: true
        run: bash ${{ github.workspace }}/scripts/coverage/package_artifacts.sh

      - name: Upload coverage artifact
        if: ${{ always() }}
        continue-on-error: true
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-report-${{ matrix.config.name }}
          path: |
            coverage-report.tgz
            coverage.info
            python-coverage.xml
            js-lcov.info
          if-no-files-found: warn
          retention-days: 30
          compression-level: 0

  UploadCoverage:
    if: ${{ always() }}
    continue-on-error: true
    needs: Coverage
    runs-on: ubuntu-latest-4-cores
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        upload:
          - { name: "C++", file: "coverage.info", flag: "cpp-runtime-tests" }
          - { name: "Python", file: "python-coverage.xml", flag: "python-api-frontend-layer-ovc" }
          - { name: "JS", file: "js-lcov.info", flag: "nodejs-bindings-unit-e2e" }
    steps:
      - name: Checkout sources for Codecov path mapping
        continue-on-error: true
        uses: ababushk/checkout@9bec46a94a83db82acd4303e7627d88db71402a5 # cherry_pick_retries
        with:
          fetch-depth: 0
          submodules: 'true'

      - name: Download coverage artifacts
        continue-on-error: true
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-report-*
          path: ${{ github.workspace }}
          merge-multiple: true

      - name: List downloaded coverage files
        continue-on-error: true
        run: |
          ls -lah "${{ github.workspace }}" || true
          ls -lah "${{ github.workspace }}/coverage.info" "${{ github.workspace }}/python-coverage.xml" "${{ github.workspace }}/js-lcov.info" 2>/dev/null || true

      - name: Verify coverage input file
        id: verify_file
        continue-on-error: true
        run: |
          target="${{ github.workspace }}/${{ matrix.upload.file }}"
          if [[ -s "${target}" ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Using coverage file: ${target}"
            ls -lh "${target}" || true
            case "${{ matrix.upload.file }}" in
              *.info)
                grep -m 3 '^SF:' "${target}" || true
                ;;
              *.xml)
                head -n 5 "${target}" || true
                ;;
            esac
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Coverage file missing or empty: ${target}"
          fi

      - name: Collect coverage (${{ matrix.upload.name }})
        if: ${{ steps.verify_file.outputs.exists == 'true' }}
        continue-on-error: true
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ${{ matrix.upload.file }}
          disable_search: true
          flags: ${{ matrix.upload.flag }}
          token: ${{ secrets.CODECOV_TOKEN }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: false
          verbose: true

          IFS=',' read -r -a tests <<< "${JS_TEST_NAMES}"
          for test_name in "${tests[@]}"; do
            [[ -n "${test_name}" ]] || continue
            printf '%s,%s,%s,%s\n' "${test_name}" "not_run" "0.000" "0.000" >> "${{ github.workspace }}/js-test-durations.csv"
            total=$((total + 1))
          done
          {
            echo "JS_TESTS_TOTAL=${total}"
            echo "JS_TESTS_PASSED=0"
            echo "JS_TESTS_FAILED=0"
            echo "JS_TESTS_SKIPPED=0"
            echo "JS_TESTS_NOT_RUN=${total}"

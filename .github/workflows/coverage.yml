          plugins: noop
          flags: nodejs-bindings-unit-e2e-${{ matrix.lane }}-shard-${{ matrix.js_shard_label }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: true
          verbose: true

      - name: Upload Codecov (C++ runtime, JS suite)
        if: ${{ steps.verify_cpp_cov.outputs.exists == 'true' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: coverage.info
          disable_search: true
          plugins: noop
          flags: cpp-runtime-js-${{ matrix.lane }}-shard-${{ matrix.js_shard_label }}
          override_commit: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          override_pr: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
          fail_ci_if_error: true
          verbose: true

  CoverageSummary:
    if: ${{ always() && needs.ResolveMatrix.result == 'success' }}
    needs: [ResolveMatrix, BuildCoverageArtifacts, ResolveCppShards, ResolvePythonShards, ResolveJsShards, CoverageCpp, CoveragePython, CoverageJS]
    runs-on: ubuntu-latest-4-cores
    steps:
      - name: Download C++ artifacts
        if: ${{ needs.ResolveCppShards.outputs.count != '0' }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-cpp-*
          path: ${{ github.workspace }}/artifacts/cpp

      - name: Download Python artifacts
        if: ${{ needs.ResolvePythonShards.outputs.count != '0' }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-python-*
          path: ${{ github.workspace }}/artifacts/python

      - name: Download JS artifacts
        if: ${{ needs.ResolveJsShards.outputs.count != '0' }}
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          pattern: coverage-js-*
          path: ${{ github.workspace }}/artifacts/js

      - name: Generate final summary
        env:
          COVERAGE_SELECTION: ${{ env.COVERAGE_SELECTION }}
          SELECTED_LANES: ${{ needs.ResolveMatrix.outputs.lanes }}
        run: |
          python3 - <<'PY'
          import os
          from collections import defaultdict
          from pathlib import Path

          workspace = Path("${{ github.workspace }}")
          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          selection = os.environ["COVERAGE_SELECTION"]
          selected_lanes = os.environ["SELECTED_LANES"]

          suite_defs = [
              {
                  "suite": "C++",
                  "root": workspace / "artifacts" / "cpp",
                  "glob": "coverage-cpp-*",
                  "prefix": "coverage-cpp-",
                  "stats_file": ".coverage-stats/cpp.env",
                  "report_file": "coverage.info",
                  "total_key": "CXX_TESTS_TOTAL",
                  "executed_key": "CXX_TESTS_EXECUTED",
                  "passed_key": "CXX_TESTS_PASSED",
                  "failed_key": "CXX_TESTS_FAILED",
                  "skipped_key": "CXX_TESTS_SKIPPED",
                  "not_run_key": "CXX_TESTS_NOT_RUN",
                  "flag_patterns": lambda lane: [
                      f"cpp-runtime-cpp-{lane}-shard-*",
                  ],
              },
              {
                  "suite": "Python",
                  "root": workspace / "artifacts" / "python",
                  "glob": "coverage-python-*",
                  "prefix": "coverage-python-",
                  "stats_file": ".coverage-stats/python.env",
                  "report_file": "python-coverage.xml",
                  "total_key": "PY_TESTS_TOTAL",
                  "executed_key": None,
                  "passed_key": "PY_TESTS_PASSED",
                  "failed_key": "PY_TESTS_FAILED",
                  "skipped_key": "PY_TESTS_SKIPPED",
                  "not_run_key": "PY_TESTS_NOT_RUN",
                  "flag_patterns": lambda lane: [
                      f"python-api-frontend-layer-ovc-{lane}-shard-*",
                      f"cpp-runtime-python-{lane}-shard-*",
                  ],
              },
              {
                  "suite": "JS",
                  "root": workspace / "artifacts" / "js",
                  "glob": "coverage-js-*",
                  "prefix": "coverage-js-",
                  "stats_file": ".coverage-stats/js.env",
                  "report_file": "js-lcov.info",
                  "total_key": "JS_TESTS_TOTAL",
                  "executed_key": None,
                  "passed_key": "JS_TESTS_PASSED",
                  "failed_key": "JS_TESTS_FAILED",
                  "skipped_key": "JS_TESTS_SKIPPED",
                  "not_run_key": "JS_TESTS_NOT_RUN",
                  "flag_patterns": lambda lane: [
                      f"nodejs-bindings-unit-e2e-{lane}-shard-*",
                      f"cpp-runtime-js-{lane}-shard-*",
                  ],
              },
          ]

          def read_env_file(path: Path) -> dict[str, str]:
              values: dict[str, str] = {}
              if not path.is_file():
                  return values
              for raw_line in path.read_text(encoding="utf-8").splitlines():
                  if "=" not in raw_line:
                      continue
                  key, value = raw_line.split("=", 1)
                  values[key.strip()] = value.strip()
              return values

          def to_int(values: dict[str, str], key: str | None) -> int:
              if not key:
                  return 0
              raw = values.get(key, "0").strip()
              try:
                  return int(raw)
              except ValueError:
                  return 0

          rows: list[dict[str, object]] = []
          overall = {"total": 0, "executed": 0, "passed": 0, "failed": 0, "skipped": 0, "not_run": 0, "shards": 0}

          for suite_def in suite_defs:
              grouped: dict[tuple[str, str], dict[str, object]] = defaultdict(
                  lambda: {
                      "shards": 0,
                      "total": 0,
                      "executed": 0,
                      "passed": 0,
                      "failed": 0,
                      "skipped": 0,
                      "not_run": 0,
                      "report_size": 0,
                  }
              )
              if suite_def["root"].exists():
                  for artifact_dir in sorted(suite_def["root"].glob(suite_def["glob"])):
                      if not artifact_dir.is_dir():
                          continue
                      artifact_name = artifact_dir.name
                      suffix = artifact_name[len(suite_def["prefix"]) :]
                      lane = suffix.split("-shard-", 1)[0]
                      stats = read_env_file(artifact_dir / suite_def["stats_file"])
                      total = to_int(stats, suite_def["total_key"])
                      passed = to_int(stats, suite_def["passed_key"])
                      failed = to_int(stats, suite_def["failed_key"])
                      skipped = to_int(stats, suite_def["skipped_key"])
                      not_run = to_int(stats, suite_def["not_run_key"])
                      executed = (
                          to_int(stats, suite_def["executed_key"])
                          if suite_def["executed_key"]
                          else max(0, total - skipped - not_run)
                      )
                      report_path = artifact_dir / suite_def["report_file"]
                      report_size = report_path.stat().st_size if report_path.is_file() else 0
                      group = grouped[(lane, suite_def["suite"])]
                      group["shards"] += 1
                      group["total"] += total
                      group["executed"] += executed
                      group["passed"] += passed
                      group["failed"] += failed
                      group["skipped"] += skipped
                      group["not_run"] += not_run
                      group["report_size"] += report_size

              for (lane, suite), group in sorted(grouped.items()):
                  rows.append(
                      {
                          "lane": lane,
                          "suite": suite,
                          "shards": group["shards"],
                          "total": group["total"],
                          "executed": group["executed"],
                          "passed": group["passed"],
                          "failed": group["failed"],
                          "skipped": group["skipped"],
                          "not_run": group["not_run"],
                          "report_size": group["report_size"],
                          "flags": ", ".join(f"`{flag}`" for flag in suite_def["flag_patterns"](lane)),
                      }
                  )
                  overall["shards"] += int(group["shards"])
                  overall["total"] += int(group["total"])
                  overall["executed"] += int(group["executed"])
                  overall["passed"] += int(group["passed"])
                  overall["failed"] += int(group["failed"])
                  overall["skipped"] += int(group["skipped"])
                  overall["not_run"] += int(group["not_run"])

          denominator = max(1, overall["executed"])
          pass_rate = (overall["passed"] * 100.0) / denominator if overall["executed"] else 0.0

          lines = [
              "## Coverage Summary",
              "",
              f"**Selection:** `{selection}`",
              "",
              f"**Active lanes:** `{selected_lanes}`",
              "",
              f"**Executed pass rate:** `{pass_rate:.1f}%`",
              "",
              "### Overall",
              "| Metric | Value |",
              "| --- | ---: |",
              f"| Total test units | {overall['total']} |",
              f"| Executed | {overall['executed']} |",
              f"| Passed | {overall['passed']} |",
              f"| Failed | {overall['failed']} |",
              f"| Skipped | {overall['skipped']} |",
              f"| Not run | {overall['not_run']} |",
              f"| Shards | {overall['shards']} |",
              "",
              "### By Lane And Suite",
              "| Lane | Suite | Shards | Total | Executed | Passed | Failed | Skipped | Not run | Report Size (bytes) | Codecov Flags |",
              "| --- | --- | ---: | ---: | ---: | ---: | ---: | ---: | ---: | ---: | --- |",
          ]

          if rows:
              for row in rows:
                  lines.append(
                      f"| {row['lane']} | {row['suite']} | {row['shards']} | {row['total']} | {row['executed']} | "
                      f"{row['passed']} | {row['failed']} | {row['skipped']} | {row['not_run']} | {row['report_size']} | {row['flags']} |"
                  )
          else:
              lines.append("| - | - | 0 | 0 | 0 | 0 | 0 | 0 | 0 | 0 | - |")

          lines.extend(
              [
                  "",
                  "Merged duration artifact: `coverage-test-durations` (`coverage-test-durations-all.csv`)",
                  "",
              ]
          )
          summary_path.write_text("\n".join(lines), encoding="utf-8")
          PY

      - name: Merge duration reports
        run: |
          python3 - <<'PY'
          import csv
          from pathlib import Path

          workspace = Path("${{ github.workspace }}")
          output = workspace / "coverage-test-durations-all.csv"
          rows = []

          suite_roots = [
              ("cpp", workspace / "artifacts" / "cpp", "coverage-cpp-*", "cpp-test-durations.csv", "coverage-cpp-"),
              ("python", workspace / "artifacts" / "python", "coverage-python-*", "python-test-durations.csv", "coverage-python-"),
              ("js", workspace / "artifacts" / "js", "coverage-js-*", "js-test-durations.csv", "coverage-js-"),
          ]

          for suite, root, artifact_glob, report_name, prefix in suite_roots:
              if not root.exists():
                  continue
              for artifact_dir in sorted(root.glob(artifact_glob)):
                  report = artifact_dir / report_name
                  if not report.is_file():
                      continue
                  artifact = artifact_dir.name
                  suffix = artifact[len(prefix):]
                  lane = suffix.split("-shard-", 1)[0]
                  with report.open(encoding="utf-8", newline="") as f:
                      reader = csv.DictReader(f)
                      for row in reader:
                          rows.append(
                              {
                                  "suite": suite,
                                  "lane": lane,
                                  "artifact": artifact,
                                  "test_name": row.get("test_name", ""),
                                  "status": row.get("status", ""),
                                  "duration_seconds": row.get("duration_seconds", "0"),
                                  "duration_minutes": row.get("duration_minutes", "0"),
                              }
                          )

          rows.sort(key=lambda row: (-float(row["duration_seconds"] or 0), row["suite"], row["test_name"]))

          with output.open("w", encoding="utf-8", newline="") as f:
              writer = csv.DictWriter(
                  f,
                  fieldnames=["suite", "lane", "artifact", "test_name", "status", "duration_seconds", "duration_minutes"],
              )
              writer.writeheader()
              writer.writerows(rows)

          print(f"Wrote {len(rows)} duration row(s) to {output}")
          PY

      - name: Upload merged duration artifact
        if: ${{ always() }}
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: coverage-test-durations
          path: coverage-test-durations-all.csv
          if-no-files-found: warn
          retention-days: 14
          compression-level: 0

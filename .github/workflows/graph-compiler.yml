name: Graph Compiler GPU Backend

on:
  push:
  pull_request:

permissions:
  contents: read

env:
  GC_REPO: https://x-access-token:${{ secrets.GC_TOKEN }}@github.com/intel-sandbox/graph-compiler
  GC_TAG: main
  BUILD_DIR: ${{ github.workspace }}-gc-build
  OUTPUT_DIR: ${{ github.workspace }}-gc-bin

jobs:
  ci:
    runs-on: ${{ vars.RUNNER }}

    steps:
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Apply GPU revert patch
        run: |
          cat > /tmp/revert.patch <<'PATCH_EOF'
          diff --git a/src/plugins/intel_gpu/include/intel_gpu/plugin/common_utils.hpp b/src/plugins/intel_gpu/include/intel_gpu/plugin/common_utils.hpp
          --- a/src/plugins/intel_gpu/include/intel_gpu/plugin/common_utils.hpp
          +++ b/src/plugins/intel_gpu/include/intel_gpu/plugin/common_utils.hpp
          @@ -44,9 +44,10 @@
               const uint64_t LARGE_OUTPUT_BYTES_THRESHOLD = 4 * 1048576;
           
               const auto& device_info = engine.get_device_info();
          -    if ((device_info.gfx_ver.major >= 20 && device_info.dev_type == cldnn::device_type::discrete_gpu) ||
          +    if ((device_info.gfx_ver.major == 12 && device_info.gfx_ver.minor == 60) ||
          +        (device_info.gfx_ver.major >= 20 && device_info.dev_type == cldnn::device_type::discrete_gpu) ||
                   (device_info.dev_type == cldnn::device_type::discrete_gpu && total_output_bytes > LARGE_OUTPUT_BYTES_THRESHOLD)) {
          -        // WA: Disable USM host memory for infer request`s tensors for dGPUs, as kernel access
          +        // WA: Disable USM host memory for infer request`s tensors for PVC and subsequent dGPUs, as kernel access
                   // to system memory is slower than using an explicit memcpy (Host <-> Device) call with the copy engine
                   // Driver tickets with additional details: 6155, 10054
                   GPU_DEBUG_TRACE << "Do not use usm_host for performance issue" << std::endl;
          diff --git a/src/plugins/intel_gpu/src/graph/impls/ocl_v2/sdpa/sdpa_gen_micro.cpp b/src/plugins/intel_gpu/src/graph/impls/ocl_v2/sdpa/sdpa_gen_micro.cpp
          --- a/src/plugins/intel_gpu/src/graph/impls/ocl_v2/sdpa/sdpa_gen_micro.cpp
          +++ b/src/plugins/intel_gpu/src/graph/impls/ocl_v2/sdpa/sdpa_gen_micro.cpp
          @@ -1533,7 +1533,10 @@
               case gpu_arch::xe_hpg: {
                   config = choose_config_xehpg(static_cast<int32_t>(k_head_size), nkeys_v, thin_q, is_quantized, is_paged_attention, is_prefill);
                   break;
               }
          +    case gpu_arch::xe_hpc:
          +        config = choose_config_xehpc(static_cast<int32_t>(k_head_size), nkeys_v, thin_q, is_quantized, is_integrated, is_paged_attention, is_prefill);
          +        break;
               case gpu_arch::xe2:
               case gpu_arch::xe3:
                   config = choose_config_xe2(static_cast<int32_t>(k_head_size), nkeys_v, thin_q, is_quantized, is_integrated, is_paged_attention, is_prefill);
          diff --git a/src/plugins/intel_gpu/src/runtime/device.cpp b/src/plugins/intel_gpu/src/runtime/device.cpp
          --- a/src/plugins/intel_gpu/src/runtime/device.cpp
          +++ b/src/plugins/intel_gpu/src/runtime/device.cpp
          @@ -101,6 +101,8 @@
               { { {12,  0,  0}, {12,  9, MAX_REVISION} }, {     0,     16,     32,      0,      0,    64 }, {} },    // TGL, RKL, ADL
               { { {12, 10,  0}                         }, {     0,     16,     32,      0,      0,    64 }, {} },    // DG1
               { { {12, 55,  0}, {12, 57, MAX_REVISION} }, {     0,     16,     32,    128,    256,     0 }, {} },    // DG2
          +    { { {12, 60,  0}, {12, 60, 1}            }, {    16,     32,     64,    512,   1024,     0 }, {} },    // PVC_XL
          +    { { {12, 60,  3}, {12, 61, 7}            }, {    32,     32,     64,    512,   1024,     0 }, {} },    // PVC_XT
               { { {12, 70,  0}, {12, 71, MAX_REVISION} }, {     0.5,   16,     32,      0,      0,    64 }, {} },    // MTL/ARL-S
               { { {12, 74,  0}, {12, 74, MAX_REVISION} }, {     0.5,   16,     32,    128,    256,     0 }, {} },    // ARL-H
               { { {20,  1,  0}, {20,  2, MAX_REVISION} }, {     1,     16,     32,    128,    256,     0 }, {} },    // BMG
          diff --git a/src/plugins/intel_gpu/src/runtime/ocl/ocl_device.cpp b/src/plugins/intel_gpu/src/runtime/ocl/ocl_device.cpp
          --- a/src/plugins/intel_gpu/src/runtime/ocl/ocl_device.cpp
          +++ b/src/plugins/intel_gpu/src/runtime/ocl/ocl_device.cpp
          @@ -60,7 +60,7 @@
                   case ngen::HW::XeLP: return gpu_arch::xe_lp;
                   case ngen::HW::XeHP: return gpu_arch::xe_hp;
                   case ngen::HW::XeHPG: return gpu_arch::xe_hpg;
          -        case ngen::HW::XeHPC: OPENVINO_THROW("[GPU] XeHPC is not supported");
          +        case ngen::HW::XeHPC: return gpu_arch::xe_hpc;
                   case ngen::HW::Xe2: return gpu_arch::xe2;
                   case ngen::HW::Xe3: return gpu_arch::xe3;
                   case ngen::HW::Xe3p: return gpu_arch::xe3p;
          diff --git a/src/plugins/intel_gpu/src/runtime/sycl/sycl_device.cpp b/src/plugins/intel_gpu/src/runtime/sycl/sycl_device.cpp
          --- a/src/plugins/intel_gpu/src/runtime/sycl/sycl_device.cpp
          +++ b/src/plugins/intel_gpu/src/runtime/sycl/sycl_device.cpp
          @@ -64,7 +64,7 @@
                   case ngen::HW::XeLP: return gpu_arch::xe_lp;
                   case ngen::HW::XeHP: return gpu_arch::xe_hp;
                   case ngen::HW::XeHPG: return gpu_arch::xe_hpg;
          -        case ngen::HW::XeHPC: OPENVINO_THROW("[GPU] XeHPC is not supported");
          +        case ngen::HW::XeHPC: return gpu_arch::xe_hpc;
                   case ngen::HW::Xe2: return gpu_arch::xe2;
                   case ngen::HW::Xe3: return gpu_arch::xe3;
                   case ngen::HW::Xe3p: return gpu_arch::xe3p;
          diff --git a/src/plugins/intel_gpu/src/runtime/ze/ze_device.cpp b/src/plugins/intel_gpu/src/runtime/ze/ze_device.cpp
          --- a/src/plugins/intel_gpu/src/runtime/ze/ze_device.cpp
          +++ b/src/plugins/intel_gpu/src/runtime/ze/ze_device.cpp
          @@ -45,7 +45,7 @@
                   case ngen::HW::XeLP: return gpu_arch::xe_lp;
                   case ngen::HW::XeHP: return gpu_arch::xe_hp;
                   case ngen::HW::XeHPG: return gpu_arch::xe_hpg;
          -        case ngen::HW::XeHPC: OPENVINO_THROW("[GPU] XeHPC is not supported");
          +        case ngen::HW::XeHPC: return gpu_arch::xe_hpc;
                   case ngen::HW::Xe2: return gpu_arch::xe2;
                   case ngen::HW::Xe3: return gpu_arch::xe3;
                   case ngen::HW::Xe3p: return gpu_arch::xe3p;
          diff --git a/src/plugins/intel_gpu/thirdparty/CMakeLists.txt b/src/plugins/intel_gpu/thirdparty/CMakeLists.txt
          --- a/src/plugins/intel_gpu/thirdparty/CMakeLists.txt
          +++ b/src/plugins/intel_gpu/thirdparty/CMakeLists.txt
          @@ -14,6 +14,6 @@
                   set(ONEDNN_BUILD_DIR "${CMAKE_CURRENT_BINARY_DIR}/onednn_gpu_build")
                   set(ONEDNN_INSTALL_DIR "${CMAKE_CURRENT_BINARY_DIR}/onednn_gpu_install" CACHE PATH "Installation path for oneDNN GPU library")
                   set(ONEDNN_PREFIX_DIR "${CMAKE_CURRENT_BINARY_DIR}/onednn_gpu_root")
          -        set(ONEDNN_ENABLED_PRIMITIVES "CONCAT;CONVOLUTION;DECONVOLUTION;GATED_MLP;MATMUL;REORDER;POOLING;REDUCTION;RNN")
          -        set(ONEDNN_ENABLED_ISA "XELP;XEHP;XEHPG;XE2;XE3;XE3P")
          +        set(ONEDNN_ENABLED_PRIMITIVES "CONCAT;CONVOLUTION;DECONVOLUTION;GATED_MLP;INNER_PRODUCT;MATMUL;REORDER;POOLING;REDUCTION;SDPA;RNN")
          +        set(ONEDNN_ENABLED_ISA "ALL")
                   set(DNNL_GPU_LIBRARY_NAME "openvino_onednn_gpu" CACHE STRING "Name of oneDNN library for Intel GPU Plugin")
          PATCH_EOF
          # Idempotent: skip if the patch is already applied (e.g. reused workspace).
          if git -C "$GITHUB_WORKSPACE" apply --reverse --check /tmp/revert.patch 2>/dev/null; then
            echo "Revert patch already applied, skipping."
          else
            git -C "$GITHUB_WORKSPACE" apply -v /tmp/revert.patch
          fi

      - name: Build
        run: |
          mkdir -p $BUILD_DIR
          run_build() {
            [ "$1" = '-c' ] && rm -rf $BUILD_DIR
            mkdir -p $BUILD_DIR
            cmake -G Ninja -S "$GITHUB_WORKSPACE" -B "$BUILD_DIR" \
              -DOUTPUT_ROOT="$OUTPUT_DIR" \
              -DGRAPH_COMPILER_REPO="$GC_REPO" \
              -DGRAPH_COMPILER_TAG="$GC_TAG" \
              -DENABLE_INTEL_GPU=ON \
              -DENABLE_GRAPH_COMPILER=ON \
              -DENABLE_TESTS=ON \
              -DENABLE_ONEDNN_FOR_GPU=OFF \
              -DENABLE_INTEL_CPU=OFF \
              -DENABLE_INTEL_NPU=OFF \
              -DCMAKE_CXX_FLAGS="-DOV_GPU_OPENCL_HPP_HAS_UUID -DOV_GPU_OPENCL_HPP_HAS_BUS_INFO" \
              -DOpenCL_HPP_INCLUDE_DIR="$GITHUB_WORKSPACE/thirdparty/ocl/clhpp_headers/include" \
              -DOpenCL_HPP="$GITHUB_WORKSPACE/thirdparty/ocl/clhpp_headers/include/CL/opencl.hpp"
            cmake --build "$BUILD_DIR" --parallel
          }

          if [ -d "$BUILD_DIR" ]; then
            # Reuse build artifacts from previous build. If the build fails, clean and rebuild.
            run_build || run_build -c
          else
            run_build
          fi
      
      - name: Test
        run: |
          # These tests require MLIR patches:
          # https://github.com/llvm/llvm-project/pull/208932
          # https://github.com/llvm/llvm-project/pull/197281
          exclude='.*ScaledAttnLayerGPUMlirTest.CompareWithRefs.*|mlir_Transpose.*|mlir_ReshapeAndTranspose.*'

          export OV_GPU_ENABLE_MLIR=1
          export OV_GPU_QUEUE_TYPE=out-of-order
          func_tests="$OUTPUT_DIR/bin/intel64/Release/ov_gpu_func_tests"
          filter=$(printf '%s:' \
            'MLIRExecution.SimpleMatmulf16' \
            'MLIRExecution.SDPABasic' \
            '*ScaledAttnLayerGPUMlirTest*' \
            'mlir_*' \
          )
          tests=$("$func_tests" --gtest_list_tests --gtest_filter="${filter%:}" \
            | awk -v exclude="$exclude" '/^  /{print suite $1} /^[^ ]/{suite=$1}' \
            | grep -v -E "$exclude")
          start=$SECONDS
          echo "$tests" | xargs -P 32 -I{} "$func_tests" --gtest_filter='{}'
          echo "Run $(echo "$tests" | wc -l) tests in $((SECONDS - start))s"

name: NPU tests

on:
  workflow_call:
    inputs:
      runner:
        description: 'Machine on which the tests would run'
        type: string
        required: true
      affected-components:
        description: 'Components that are affected by changes in the commit defined by the Smart CI Action'
        type: string
        required: false
        default: '{"TF_FE":{"test":true},"JAX_FE":{"test":true},"PyTorch_FE":{"test":true}}'
      image:
        description: 'Docker image to use for the job (Linux only; leave empty on Windows)'
        type: string
        required: false
        default: null
      test-device:
        description: 'OpenVINO device to test against'
        type: string
        required: false
        default: 'NPU'
      npu-platforms:
        description: 'JSON list of NPU platforms to compile for (offline), each runs on its own runner. e.g. ["3720","4000","5010","5020"]'
        type: string
        required: false
        default: '["3720","4000","5010","5020"]'
      model-scope:
        description: 'Scope of models for testing (pytest marker)'
        type: string
        required: false
        default: 'precommit'

permissions: read-all

env:
  PYTHON_VERSION: '3.11'
  PIP_CACHE_PATH: "C:\\mount\\caches\\pip\\win"

jobs:
  TensorFlow_NPU_Models_Tests:
    name: TF NPU Models tests (${{ matrix.npu-platform }})
    if: fromJSON(inputs.affected-components).TF_FE.test
    timeout-minutes: 60
    strategy:
      # one runner per NPU platform; keep going even if one platform fails
      fail-fast: false
      matrix:
        npu-platform: ${{ fromJSON(inputs.npu-platforms) }}
    defaults:
      run:
        shell: pwsh
    runs-on: ${{ inputs.runner }}
    env:
      INSTALL_DIR: "${{ github.workspace }}\\install"
      INSTALL_TEST_DIR: "${{ github.workspace }}\\install\\tests"
      INSTALL_WHEELS_DIR: "${{ github.workspace }}\\install\\wheels"
      TEST_DEVICE: ${{ inputs.test-device }}
      NPU_PLATFORM: ${{ matrix.npu-platform }}
      MODEL_SCOPE: ${{ inputs.model-scope }}
    steps:
      - name: Download OpenVINO artifacts (tests)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_tests
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download OpenVINO artifacts (wheels)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_wheels
          path: ${{ env.INSTALL_WHEELS_DIR }}
          merge-multiple: true

      - name: Extract OpenVINO tests package
        run: Expand-Archive openvino_tests.zip -DestinationPath . -Verbose
        working-directory: ${{ env.INSTALL_DIR }}

      - name: Fetch setup_python and install wheels actions
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: |
            .github/actions/setup_python/action.yml
            .github/actions/install_ov_wheels/action.yml
          sparse-checkout-cone-mode: false
          path: 'openvino'

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: ./openvino/.github/actions/setup_python
        with:
          version: ${{ env.PYTHON_VERSION }}
          pip-cache-path: ${{ env.PIP_CACHE_PATH }}
          set-pip-install-path: 'false'
          self-hosted-runner: ${{ contains(inputs.runner, 'aks') }}
          use-pip-proxy: ${{ contains(inputs.runner, 'aks') }}

      - name: Install OpenVINO Python wheels
        uses: ./openvino/.github/actions/install_ov_wheels
        with:
          wheels-dir-path: ${{ env.INSTALL_WHEELS_DIR }}
          wheels-to-install: 'openvino'

      - name: Set SSL_CERT_FILE for model downloading
        run: echo SSL_CERT_FILE=$(python3 -m certifi) >> $env:GITHUB_ENV

      - name: Install TF Models tests requirements
        run: python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\requirements_tensorflow

      - name: TensorFlow Models Tests - NPU compile-only (convert_model)
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\tensorflow\test_tf_convert_model.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-tf_fe_npu_convert_model_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          # Make the NPU plugin log the chosen compiler/platform.
          OV_NPU_LOG_LEVEL: LOG_INFO

      - name: TensorFlow Models Tests - NPU compile-only (read_model)
        if: ${{ !cancelled() }}
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\tensorflow\test_tf_read_model.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-tf_fe_npu_read_model_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          # Make the NPU plugin log the chosen compiler/platform.
          OV_NPU_LOG_LEVEL: LOG_INFO

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results-tensorflow-npu-models-${{ matrix.npu-platform }}-${{ inputs.model-scope }}
          path: |
            ${{ env.INSTALL_TEST_DIR }}\TEST*.html
          if-no-files-found: 'error'

  JAX_NPU_Models_Tests:
    name: JAX NPU Models tests (${{ matrix.npu-platform }})
    if: fromJSON(inputs.affected-components).JAX_FE.test
    timeout-minutes: 60
    strategy:
      # one runner per NPU platform; keep going even if one platform fails
      fail-fast: false
      matrix:
        npu-platform: ${{ fromJSON(inputs.npu-platforms) }}
    defaults:
      run:
        shell: pwsh
    runs-on: ${{ inputs.runner }}
    env:
      INSTALL_DIR: "${{ github.workspace }}\\install"
      INSTALL_TEST_DIR: "${{ github.workspace }}\\install\\tests"
      INSTALL_WHEELS_DIR: "${{ github.workspace }}\\install\\wheels"
      TEST_DEVICE: ${{ inputs.test-device }}
      NPU_PLATFORM: ${{ matrix.npu-platform }}
      MODEL_SCOPE: ${{ inputs.model-scope }}
    steps:
      - name: Download OpenVINO artifacts (tests)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_tests
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download OpenVINO artifacts (wheels)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_wheels
          path: ${{ env.INSTALL_WHEELS_DIR }}
          merge-multiple: true

      - name: Extract OpenVINO tests package
        run: Expand-Archive openvino_tests.zip -DestinationPath . -Verbose
        working-directory: ${{ env.INSTALL_DIR }}

      - name: Fetch setup_python and install wheels actions
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: |
            .github/actions/setup_python/action.yml
            .github/actions/install_ov_wheels/action.yml
          sparse-checkout-cone-mode: false
          path: 'openvino'

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: ./openvino/.github/actions/setup_python
        with:
          version: ${{ env.PYTHON_VERSION }}
          pip-cache-path: ${{ env.PIP_CACHE_PATH }}
          set-pip-install-path: 'false'
          self-hosted-runner: ${{ contains(inputs.runner, 'aks') }}
          use-pip-proxy: ${{ contains(inputs.runner, 'aks') }}

      - name: Install OpenVINO Python wheels
        uses: ./openvino/.github/actions/install_ov_wheels
        with:
          wheels-dir-path: ${{ env.INSTALL_WHEELS_DIR }}
          wheels-to-install: 'openvino'

      - name: Set SSL_CERT_FILE for model downloading
        run: echo SSL_CERT_FILE=$(python3 -m certifi) >> $env:GITHUB_ENV

      - name: Install JAX Models tests requirements
        run: python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\requirements_jax

      - name: JAX/Flax Models Tests - NPU compile-only
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\jax\test_hf_transformers.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-jax_npu_model_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          # Make the NPU plugin log the chosen compiler/platform.
          OV_NPU_LOG_LEVEL: LOG_INFO

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results-jax-npu-models-${{ matrix.npu-platform }}-${{ inputs.model-scope }}
          path: |
            ${{ env.INSTALL_TEST_DIR }}\TEST*.html
          if-no-files-found: 'error'

  PyTorch_NPU_Models_Tests:
    name: PyTorch NPU Models tests (${{ matrix.npu-platform }})
    if: fromJSON(inputs.affected-components).PyTorch_FE.test
    timeout-minutes: 120
    strategy:
      # one runner per NPU platform (like TF/JAX). The PyTorch test files have mutually
      # incompatible env deps, so within a leg they are grouped by dep-compatibility and
      # the requirements are reinstalled only between groups (mirrors job_pytorch_models_tests).
      fail-fast: false
      matrix:
        npu-platform: ${{ fromJSON(inputs.npu-platforms) }}
    defaults:
      run:
        shell: pwsh
    runs-on: ${{ inputs.runner }}
    env:
      INSTALL_DIR: "${{ github.workspace }}\\install"
      INSTALL_TEST_DIR: "${{ github.workspace }}\\install\\tests"
      INSTALL_WHEELS_DIR: "${{ github.workspace }}\\install\\wheels"
      TEST_DEVICE: ${{ inputs.test-device }}
      NPU_PLATFORM: ${{ matrix.npu-platform }}
      MODEL_SCOPE: ${{ inputs.model-scope }}
    steps:
      - name: Download OpenVINO artifacts (tests)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_tests
          path: ${{ env.INSTALL_DIR }}
          merge-multiple: true

      - name: Download OpenVINO artifacts (wheels)
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: openvino_wheels
          path: ${{ env.INSTALL_WHEELS_DIR }}
          merge-multiple: true

      - name: Extract OpenVINO tests package
        run: Expand-Archive openvino_tests.zip -DestinationPath . -Verbose
        working-directory: ${{ env.INSTALL_DIR }}

      - name: Fetch setup_python and install wheels actions
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          sparse-checkout: |
            .github/actions/setup_python/action.yml
            .github/actions/install_ov_wheels/action.yml
          sparse-checkout-cone-mode: false
          path: 'openvino'

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: ./openvino/.github/actions/setup_python
        with:
          version: ${{ env.PYTHON_VERSION }}
          pip-cache-path: ${{ env.PIP_CACHE_PATH }}
          set-pip-install-path: 'false'
          self-hosted-runner: ${{ contains(inputs.runner, 'aks') }}
          use-pip-proxy: ${{ contains(inputs.runner, 'aks') }}

      - name: Install OpenVINO Python wheels
        uses: ./openvino/.github/actions/install_ov_wheels
        with:
          wheels-dir-path: ${{ env.INSTALL_WHEELS_DIR }}
          wheels-to-install: 'openvino'

      - name: Set SSL_CERT_FILE for model downloading
        run: echo SSL_CERT_FILE=$(python3 -m certifi) >> $env:GITHUB_ENV

      # Group A: torchvision + timm + edsr share compatible deps (installed together).
      - name: "Install PyTorch tests requirements (group A: torchvision/timm/edsr)"
        run: |
          python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\requirements_pytorch `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\torchvision.txt `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\timm.txt `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\edsr.txt

      - name: PyTorch Models Tests - NPU compile-only (group A)
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_torchvision_models.py ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_timm.py ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_edsr.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-pt_npu_groupA_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          OV_NPU_LOG_LEVEL: LOG_INFO

      # Group B: hf_transformers + easyocr + gfpgan + tpsmm share compatible deps.
      - name: "Install PyTorch tests requirements (group B: hf_transformers/easyocr/gfpgan/tpsmm)"
        run: |
          python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\requirements_pytorch `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\hf_transformers.txt `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\easyocr.txt `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\gfpgan.txt `
            -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\tpsmm.txt

      - name: PyTorch Models Tests - NPU compile-only (group B)
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_hf_transformers.py ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_easyocr.py ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_gfpgan.py ^
            ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_tpsmm.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-pt_npu_groupB_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          OV_NPU_LOG_LEVEL: LOG_INFO

      # Group C: llm is isolated. llm_build_deps.txt must be installed BEFORE llm.txt
      # (pypcre is a build-time dep of gptqmodel); llm.txt needs --no-build-isolation.
      # GPTQ/AWQ quantized deps are gated to Linux/x86_64, so on Windows only the
      # non-quantized precommit models are exercised.
      - name: "Install PyTorch tests requirements (group C: llm)"
        run: |
          python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\requirements_pytorch
          python3 -m pip install -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\llm_build_deps.txt
          python3 -m pip install --no-build-isolation -r ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\envs\llm.txt

      - name: "PyTorch Models Tests - NPU compile-only (group C: llm)"
        shell: cmd
        run: |
          set PYTHONPATH=${{ env.INSTALL_TEST_DIR }}\model_hub_tests;%PYTHONPATH%
          python3 -m pytest ${{ env.INSTALL_TEST_DIR }}\model_hub_tests\pytorch\test_llm.py -m "%MODEL_SCOPE%" ^
            --html=${{ env.INSTALL_TEST_DIR }}\TEST-pt_npu_llm_%NPU_PLATFORM%_%MODEL_SCOPE%.html --self-contained-html -v -s
        env:
          OV_NPU_LOG_LEVEL: LOG_INFO

      - name: Upload Test Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: test-results-pytorch-npu-models-${{ matrix.npu-platform }}-${{ inputs.model-scope }}
          path: |
            ${{ env.INSTALL_TEST_DIR }}\TEST*.html
          if-no-files-found: 'error'

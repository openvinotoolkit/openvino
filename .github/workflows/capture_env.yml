---
name: Capture Environment Info

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  capture-env:
    name: Collect Environment Variables
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Environment Collector
        run: python .github/scripts/collect_env.py

      - name: Save PR Number
        run: echo "${{ github.event.pull_request.number }}" > pr_number.txt

      - name: Upload Environment Data
        uses: actions/upload-artifact@v4
        with:
          name: env-data
          path: |
            env_info.md
            pr_number.txt
          retention-days: 1


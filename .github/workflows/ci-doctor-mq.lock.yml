pattern has 3 or more occurrences in the last 12 hours. Do NOT call this for every failure.","inputs":{"affected_prs":{"default":null,"description":"Markdown-formatted list of affected PR numbers/links from the merge queue that hit this failure in the last 12 hours. One PR per line, e.g. '- [#1234](https://github.com/org/repo/pull/1234)'. Include up to 10 most recent PRs.","required":true,"type":"string"},"description":{"default":null,"description":"Concise markdown gist of the recurring problem: what keeps failing, suspected root cause, and recommended escalation actions. Use Teams-safe markdown only (no raw HTML).","required":true,"type":"string"},"failed_workflow":{"default":null,"description":"Name of the GitHub Actions workflow with the recurring failure.","required":true,"type":"string"},"pipeline_url":{"default":null,"description":"URL of the current (latest) failed workflow run.","required":true,"type":"string"},"recent_count":{"default":null,"description":"Number of times this failure pattern has occurred in the last 12 hours, including the current run. Report as a positive integer encoded as a string (e.g., '3', '5').","required":true,"type":"string"},"recent_run_urls":{"default":null,"description":"Markdown-formatted list of workflow run URLs that exhibited this failure in the last 12 hours. One URL per line, e.g. '- [Run 12345](https://github.com/org/repo/actions/runs/12345)'. Include up to 10 most recent runs.","required":true,"type":"string"},"title":{"default":null,"description":"Short, searchable description of the recurring failure pattern (same as notify_teams.title).","required":true,"type":"string"}},"output":"Recurring failure escalation sent to Microsoft Teams."},"push_repo_memory":{"memories":[{"dir":"/tmp/gh-aw/repo-memory/default","id":"default","max_file_count":500,"max_file_size":1048576,"max_patch_size":1048576}]},"readd-to-merge-queue":{"description":"Re-add a pull request that was removed from the merge queue because of the analysed pipeline failure back into the merge queue. Call this at most once and ONLY when the investigation concludes the failure is transient and a plain re-queue is likely to let the PR merge (e.g. Infrastructure, Flaky Test, Network, or External Service categories such as runner hiccups, network timeouts, cancelled jobs, or downstream outages). Do NOT call for deterministic Code Issue / Dependencies / Configuration failures that re-queuing cannot fix.","inputs":{"pr_number":{"default":null,"description":"Number of the pull request that was dropped from the merge queue and should be re-added. Report as a numeric string.","required":true,"type":"string"},"reason":{"default":null,"description":"Short justification for why re-queuing is expected to let the PR merge (e.g. 'network timeout while downloading dependencies').","required":true,"type":"string"},"repository":{"default":"not_found","description":"The owner/repo of the repository that owns the pull request (e.g. 'openvinotoolkit/openvino'). Defaults to the current repository when omitted.","required":false,"type":"string"}},"output":"Re-add to merge queue requested for the affected pull request."},"report_incomplete":{},"rerun-failed-jobs":{"description":"Re-run ONLY the failed jobs of the analysed workflow run. Call this at most once and ONLY when the investigation concludes the failure is transient and a plain restart is likely to fix it (e.g. Infrastructure, Flaky Test, Network, or External Service categories such as runner hiccups, network timeouts, or downstream outages). Do NOT call for deterministic Code Issue / Dependencies / Configuration failures that a restart cannot fix.","inputs":{"reason":{"default":null,"description":"Short justification for why a restart is expected to remedy the failure (e.g. 'network timeout while downloading dependencies').","required":true,"type":"string"},"repository":{"default":"not_found","description":"The owner/repo of the repository that owns the analysed run (e.g. 'openvinotoolkit/openvino'). Defaults to the current repository when omitted.","required":false,"type":"string"},"run_id":{"default":null,"description":"Numeric ID of the GitHub Actions workflow run whose failed jobs should be re-run. This is the run that was investigated (github.event.workflow_run.id for merge-queue triggers, or the run_id input for workflow_dispatch). Report as a numeric string.","required":true,"type":"string"}},"output":"Failed jobs re-run requested for the analysed workflow run."}}

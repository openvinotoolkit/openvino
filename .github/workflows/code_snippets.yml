name: Code snippets
on:
  push:
    paths:
      - '.github/workflows/code_snippets.yml'
      - 'docs/snippets/**'
    branches:
      - 'master'
      - 'releases/**'
  pull_request:
    paths:
      - '.github/workflows/code_snippets.yml'
      - 'docs/snippets/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

jobs:
  Build:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-22.04', 'macos-latest', 'windows-latest']
    runs-on: ${{ matrix.os }}
    if: ${{ github.repository_owner == 'openvinotoolkit' }}
    steps:
      - name: Clone OpenVINO
        uses: ababushk/checkout@dd591a6a2ac25618db4eda86e7e0d938f88cf01b # cherry_pick_retries
        timeout-minutes: 15
        with:
          submodules: 'true'

      - name: Install OpenCL
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        if: runner.os == 'Linux'
        with:
          packages: ocl-icd-opencl-dev opencl-headers
          version: 3.0

      - name: Install scons
        if: runner.os == 'macOS'
        run: brew install scons

      - name: CMake configure
        run: cmake -DCMAKE_BUILD_TYPE=Release -DTHREADING=SEQ -DCMAKE_EXPORT_COMPILE_COMMANDS=ON -B build

      - name: Build snippets
        if: ${{ runner.os == 'Linux' || runner.os == 'macOS'}}
        run:  cmake --build build --target openvino_docs_snippets --parallel $(nproc) -- --quiet

      - name: Build snippets Windows
        if: ${{ runner.os == 'Windows'}}
        shell: pwsh
        run:  cmake --build build --target openvino_docs_snippets --parallel $ENV:NUMBER_OF_PROCESSORS -- /verbosity:minimal

      - name: Upload compile_commands
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: always()
        with:
          name: compile_commands_code_snippets_${{ matrix.os }}
          path: build/compile_commands.json
          if-no-files-found: 'ignore'


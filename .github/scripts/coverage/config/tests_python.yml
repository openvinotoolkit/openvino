schema_version: 1
suite: python
tests:
  - name: pyopenvino
    kind: pytest
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/pyopenvino"
    env:
      cpu: "TEST_DEVICE=CPU"
      gpu: "TEST_DEVICE=GPU"
    args:
      cpu: "-sv -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -k 'not cuda and not npu'"

  - name: onnx_python
    kind: pytest
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/onnx"
    env:
      cpu: "TEST_DEVICE=CPU"
      gpu: "TEST_DEVICE=GPU"
    args:
      cpu: "-sv --backend=CPU -k 'not gpu and not cuda and not npu and not zoo' --ignore=${TESTS_DIR}/onnx/test_python/test_zoo_models.py --ignore=${TESTS_DIR}/onnx/tests/tests_python/test_zoo_models.py"
      gpu: "-sv --backend=GPU -k 'not cuda and not npu and not zoo' --ignore=${TESTS_DIR}/onnx/test_python/test_zoo_models.py --ignore=${TESTS_DIR}/onnx/tests/tests_python/test_zoo_models.py"

  - name: ovc_unit
    kind: pytest
    profiles: [cpu]
    target: "${TESTS_DIR}/ovc/unit_tests"
    args: "-sv -k 'not gpu and not cuda and not npu'"

  - name: py_frontend
    kind: pytest_if_dir
    profiles: [cpu]
    target: "${TESTS_DIR}/layer_tests/py_frontend_tests"
    args: "-sv -k 'not gpu and not cuda and not npu'"

  - name: tensorflow_lite_layers
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/tensorflow_lite_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP16"
    args:
      cpu: "-sv -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -k 'not cuda and not npu'"

  - name: tensorflow_layers
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/tensorflow_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP16"
    args:
      cpu: "-sv -m precommit -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit -k 'not cuda and not npu'"

  - name: tensorflow2_keras_layers
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/tensorflow2_keras_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION="
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP16"
    args:
      cpu: "-sv -m precommit -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit -k 'not cuda and not npu'"

  - name: onnx_layers
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/onnx_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP16"
    args:
      cpu: "-sv -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -k 'not cuda and not npu'"

  - name: pytorch_layers
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/pytorch_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP32"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP32"
    args:
      cpu: "-sv -m precommit -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit -k 'not cuda and not npu'"

  - name: pytorch_layers_export
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/pytorch_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP32 PYTORCH_TRACING_MODE=EXPORT"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP32 PYTORCH_TRACING_MODE=EXPORT"
    args:
      cpu: "-sv -m precommit_torch_export -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit_torch_export -k 'not cuda and not npu'"

  - name: pytorch_layers_fx_backend
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/pytorch_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP32 PYTORCH_TRACING_MODE=TORCHFX"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP32 PYTORCH_TRACING_MODE=TORCHFX"
    args:
      cpu: "-sv -m precommit_fx_backend -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit_fx_backend -k 'not cuda and not npu'"

  - name: jax_layers_precommit
    kind: pytest_if_dir
    profiles: [cpu, gpu]
    target: "${TESTS_DIR}/layer_tests/jax_tests"
    env:
      cpu: "TEST_DEVICE=CPU TEST_PRECISION=FP16 JAX_TRACE_MODE=JAXPR"
      gpu: "TEST_DEVICE=GPU TEST_PRECISION=FP16 JAX_TRACE_MODE=JAXPR"
    args:
      cpu: "-sv -m precommit_jax_fe -k 'not gpu and not cuda and not npu'"
      gpu: "-sv -m precommit_jax_fe -k 'not cuda and not npu'"

  - name: tf_api_precommit_subset
    kind: pytest_if_dir
    profiles: [cpu]
    target: "${WORKSPACE_LAYER_TESTS_DIR}/ovc_python_api_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -m precommit_tf_fe -k 'test_tf and not gpu and not cuda and not npu'"

  - name: ovc_python_api_precommit_gpu
    kind: pytest_if_dir
    profiles: [gpu]
    target: "${WORKSPACE_LAYER_TESTS_DIR}/ovc_python_api_tests"
    env: "TEST_DEVICE=GPU TEST_PRECISION=FP16"
    args: "-sv -m precommit -k 'not cuda and not npu'"

  - name: ovc_python_api_paddle_precommit
    kind: pytest
    profiles: [cpu]
    target: "${WORKSPACE_LAYER_TESTS_DIR}/ovc_python_api_tests/test_paddle.py"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -m precommit -k 'not gpu and not cuda and not npu'"

  - name: ovc_cli_help
    kind: command
    profiles: [cpu]
    command: "python3 -m coverage run -a -m openvino.tools.ovc --help"

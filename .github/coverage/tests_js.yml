schema_version: 1
suite: js
reporting:
  label: JS
  artifact_group: js
  artifact_name_template: coverage-{suite}-{lane}
  selection_env: JS_TEST_NAMES
  stats_file: js-coverage-stats.env
  duration_file: js-test-durations.csv
  coverage_file: js-lcov.info
  extra_files:
    - coverage.info
  uploads:
    - name_template: JS bindings, {lane}
      file: js-lcov.info
      flag_template: nodejs-bindings-unit-e2e-{lane}
    - name_template: C++ runtime, JS suite, {lane}
      file: coverage.info
      flag_template: cpp-runtime-js-{lane}
tests:
  - name: node tests/setup.js (covered)
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=true --exclude 'tests/**' --exclude 'thirdparty/**' node ./tests/setup.js"

  - name: node scripts/download-runtime.js --ignore-if-exists (covered)
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node ./scripts/download-runtime.js --ignore-if-exists"

  - name: node unit core.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/core.test.js"

  - name: node unit model.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/model.test.js"

  - name: node unit read_model.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/read_model.test.js"

  - name: node unit basic.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/basic.test.js"

  - name: node unit compiled_model.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/compiled_model.test.js"

  - name: node unit infer_request.test.js
    kind: command
    profiles: [cpu]
    command: "npx c8 --reporter=lcov --reporter=text --report-dir ${OV_WORKSPACE}/js-coverage --clean=false --exclude 'tests/**' --exclude 'thirdparty/**' node --test ./tests/unit/infer_request.test.js"

  - name: node unit async_infer_queue.test.js
    kind: command

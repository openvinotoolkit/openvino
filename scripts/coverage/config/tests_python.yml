schema_version: 1
suite: python
tests:
  - name: pyopenvino
    kind: pytest
    target: "${TESTS_DIR}/pyopenvino"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append --ignore=${TESTS_DIR}/pyopenvino/tests/test_utils/test_utils.py"

  - name: onnx_python
    kind: pytest
    target: "${TESTS_DIR}/onnx"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not cuda' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append --ignore=${TESTS_DIR}/onnx/test_python/test_zoo_models.py"

  - name: ovc_unit
    kind: pytest
    target: "${TESTS_DIR}/ovc/unit_tests"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: py_frontend
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/py_frontend_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: tensorflow_lite_layers
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/tensorflow_lite_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: tensorflow_layers
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/tensorflow_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: onnx_layers
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/onnx_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: pytorch_layers
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/pytorch_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: paddle_layers
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/paddle_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: jax_layers_precommit
    kind: pytest_if_dir
    target: "${TESTS_DIR}/layer_tests/jax_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -m precommit_jax_fe --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_runtime
    kind: pytest_if_dir
    target: "${SRC_PY_TESTS_DIR}/test_runtime"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_graph
    kind: pytest_if_dir
    target: "${SRC_PY_TESTS_DIR}/test_graph"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_transformations
    kind: pytest_if_dir
    target: "${SRC_PY_TESTS_DIR}/test_transformations"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_onnx_frontend_python
    kind: pytest_if_dir
    target: "${ONNX_PY_TESTS_DIR}"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu and not zoo' --ignore=${ONNX_PY_TESTS_DIR}/test_zoo_models.py --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_runtime_strict
    kind: pytest_if_dir
    target: "${SRC_PY_TESTS_DIR}/test_runtime"
    args: "-q --maxfail=1 -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_utils
    kind: pytest_if_dir
    target: "${SRC_PY_TESTS_DIR}/test_utils"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -k 'not gpu and not cuda and not npu' --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: src_py_package_versions
    kind: pytest
    target: "${SRC_PY_TESTS_DIR}/test_package_versions.py"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: tf_api_precommit_subset
    kind: pytest_if_dir
    target: "${WORKSPACE_LAYER_TESTS_DIR}/ovc_python_api_tests"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -m precommit_tf_fe -k test_tf --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: ovc_python_api_paddle_precommit
    kind: pytest
    target: "${WORKSPACE_LAYER_TESTS_DIR}/ovc_python_api_tests/test_paddle.py"
    env: "TEST_DEVICE=CPU TEST_PRECISION=FP16"
    args: "-sv -n ${PYTEST_XDIST_WORKERS} -m precommit --cov=openvino --cov-config=${PY_COV_CONFIG} --cov-append"

  - name: ovc_cli_help
    kind: command
    command: "python3 -m coverage run -a -m openvino.tools.ovc --help"

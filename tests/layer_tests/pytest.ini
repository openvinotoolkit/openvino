[pytest]
markers =
    nightly
    precommit
    precommit_tf_fe
    precommit_fx_backend
    precommit_torch_export
    precommit_jax_fe
    timeout

filterwarnings =
    # torch.jit.script/trace/trace_method are deprecated in favour of torch.compile/torch.export.
    # These warnings fire on every scripted/traced test and are not actionable at the test level.
    ignore:`torch.jit.script` is deprecated:DeprecationWarning
    ignore:`torch.jit.trace` is deprecated:DeprecationWarning
    ignore:`torch.jit.trace_method` is deprecated:DeprecationWarning

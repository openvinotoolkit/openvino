name: Create Ticket
description: >
  Create a tracking GitHub issue for the enablement pipeline.
  If ticket_number is already provided, this action is a no-op and simply
  re-emits the existing number. Otherwise it opens a new issue and returns
  the new number.

inputs:
  model_id:
    description: "HuggingFace model ID (used for the issue title)"
    required: true
  ticket_number:
    description: "Existing issue number. Leave empty to auto-create a new one."
    required: false
    default: ""
  analysis_summary:
    description: "Initial body text for the newly created issue."
    required: false
    default: "Pipeline started — progress updates will follow."

outputs:
  issue_number:
    value: ${{ steps.resolve.outputs.issue }}

runs:
  using: composite
  steps:
    - id: resolve
      uses: actions/github-script@v7
      with:
        script: |
          const existing = process.env.TICKET_NUMBER.trim();
          if (existing) {
            // User already provided a ticket — just pass it through.
            core.setOutput("issue", existing);
            core.info(`Using existing ticket #${existing}`);
          } else {
            // Auto-create a new tracking issue.
            const modelId = process.env.MODEL_ID;
            const body = process.env.SUMMARY;
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[MEAT] Enablement: ${modelId}`,
              body,
              labels: ["enablement", "automated"]
            });
            core.setOutput("issue", String(issue.data.number));
            core.info(`Created tracking ticket #${issue.data.number}`);
          }
      env:
        MODEL_ID: ${{ inputs.model_id }}
        TICKET_NUMBER: ${{ inputs.ticket_number }}
        SUMMARY: ${{ inputs.analysis_summary }}

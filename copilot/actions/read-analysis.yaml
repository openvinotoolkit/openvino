name: Read Analysis Summary
description: Reads an agent report or analysis output file and returns its content.

inputs:
  report_file:
    description: "Path to the Markdown report file to read (default: agent_report.md)"
    required: false
    default: agent_report.md

outputs:
  summary:
    description: "Markdown content of the report file (base64-encoded to preserve newlines)"
    value: ${{ steps.read.outputs.summary }}
  summary_plain:
    description: "First 500 characters of the report, plain text, safe for single-line use"
    value: ${{ steps.read.outputs.summary_plain }}

runs:
  using: composite
  steps:
    - id: read
      shell: bash
      run: |
        FILE="${{ inputs.report_file }}"
        if [ -f "$FILE" ]; then
          # Base64-encode to safely pass multiline Markdown through GHA outputs
          ENCODED=$(base64 -w0 < "$FILE")
          echo "summary=${ENCODED}" >> "$GITHUB_OUTPUT"
          # Plain short excerpt (first 500 chars, newlines replaced with spaces)
          PLAIN=$(head -c 500 "$FILE" | tr '\n' ' ')
          echo "summary_plain=${PLAIN}" >> "$GITHUB_OUTPUT"
        else
          echo "summary=" >> "$GITHUB_OUTPUT"
          echo "summary_plain=(no report file found at ${FILE})" >> "$GITHUB_OUTPUT"
          echo "[read-analysis] WARNING: report file not found: ${FILE}" >&2
        fi

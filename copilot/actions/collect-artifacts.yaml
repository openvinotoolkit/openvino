name: Collect Artifacts
description: >
  Append artifact/patch metadata to the run-scoped MEAT manifest, then
  re-upload it so the next job can download and consume it.
  Also posts the artifact table to the tracking issue when issue_number is
  provided.

inputs:
  # ── agent identity ──────────────────────────────────────────────────────
  agent:
    description: "Name of the agent producing the artifact (e.g. optimum-intel)"
    required: true
  pass_num:
    description: "Pipeline pass number (1 or 2)"
    required: false
    default: "1"

  # ── artifact metadata (repeat this action call once per artifact) ───────
  type:
    description: "Artifact type: patch | wheel | model_ir | override_url | analysis | log"
    required: true
  component:
    description: "Upstream component this artifact targets (e.g. optimum-intel, openvino, pytorch-fe)"
    required: true
  artifact_name:
    description: "GHA artifact name that was uploaded (used to build download URLs)"
    required: false
    default: ""
  artifact_url:
    description: "Direct download URL (if already known)"
    required: false
    default: ""
  install_cmd:
    description: "pip install command that downstream jobs must run to apply this artifact"
    required: false
    default: ""
  branch:
    description: "Git branch name holding the fix (if applicable)"
    required: false
    default: ""
  description:
    description: "One-line human-readable description of what this artifact contains"
    required: false
    default: ""

  # ── manifest artifact naming ─────────────────────────────────────────────
  manifest_artifact_name:
    description: "GHA artifact name for the manifest file (default: meat-manifest-<run_id>)"
    required: false
    default: ""

  # ── issue reporting ──────────────────────────────────────────────────────
  issue_number:
    description: "Tracking issue number. If provided, posts an artifact comment."
    required: false
    default: ""

outputs:
  manifest_artifact_name:
    description: "Name of the (re)uploaded manifest artifact"
    value: ${{ steps.names.outputs.manifest_name }}
  manifest_json:
    description: "Full manifest JSON string after appending new entry"
    value: ${{ steps.append.outputs.manifest_json }}
  entries_count:
    description: "Total number of entries in the manifest after this call"
    value: ${{ steps.append.outputs.manifest_entries }}

runs:
  using: composite
  steps:
    # 1. Resolve artifact name
    - id: names
      shell: bash
      run: |
        GIVEN="${{ inputs.manifest_artifact_name }}"
        if [ -z "$GIVEN" ]; then
          echo "manifest_name=meat-manifest-${GITHUB_RUN_ID}" >> "$GITHUB_OUTPUT"
        else
          echo "manifest_name=${GIVEN}" >> "$GITHUB_OUTPUT"
        fi

    # 2. Try to download the existing manifest from the previous job (may not
    #    exist on the first call — that is fine, collect_artifacts.py handles it)
    - name: Download existing manifest
      uses: actions/download-artifact@v4
      continue-on-error: true
      with:
        name: ${{ steps.names.outputs.manifest_name }}
        path: _meat_manifest/

    - name: Move manifest into working dir
      shell: bash
      run: |
        if [ -f "_meat_manifest/meat_manifest.json" ]; then
          cp _meat_manifest/meat_manifest.json meat_manifest.json
          echo "[collect-artifacts] Loaded existing manifest."
        else
          echo "[collect-artifacts] No existing manifest found — starting fresh."
        fi

    # 3. Append the new entry
    - id: append
      shell: bash
      run: |
        python scripts/collect_artifacts.py add \
          --manifest   meat_manifest.json \
          --agent      "${{ inputs.agent }}" \
          --pass       "${{ inputs.pass_num }}" \
          --type       "${{ inputs.type }}" \
          --component  "${{ inputs.component }}" \
          --artifact-name "${{ inputs.artifact_name }}" \
          --artifact-url  "${{ inputs.artifact_url }}" \
          --install-cmd   "${{ inputs.install_cmd }}" \
          --branch        "${{ inputs.branch }}" \
          --description   "${{ inputs.description }}"

    # 4. Re-upload updated manifest so the next job can pick it up
    - name: Upload updated manifest
      uses: actions/upload-artifact@v4
      with:
        name: ${{ steps.names.outputs.manifest_name }}
        path: meat_manifest.json
        overwrite: true
        retention-days: 90

    # 5. Post artifact summary to tracking issue (optional)
    - name: Post artifact comment to issue
      if: ${{ inputs.issue_number != '' }}
      uses: actions/github-script@v7
      env:
        ISSUE_NUMBER: ${{ inputs.issue_number }}
        ARTIFACT_TYPE: ${{ inputs.type }}
        ARTIFACT_COMPONENT: ${{ inputs.component }}
        ARTIFACT_DESCRIPTION: ${{ inputs.description }}
        ARTIFACT_URL: ${{ inputs.artifact_url }}
        ARTIFACT_NAME: ${{ inputs.artifact_name }}
        INSTALL_CMD: ${{ inputs.install_cmd }}
        BRANCH: ${{ inputs.branch }}
        AGENT: ${{ inputs.agent }}
        PASS_NUM: ${{ inputs.pass_num }}
      with:
        script: |
          const issueNumber = Number(process.env.ISSUE_NUMBER);
          const type        = process.env.ARTIFACT_TYPE;
          const component   = process.env.ARTIFACT_COMPONENT;
          const description = process.env.ARTIFACT_DESCRIPTION || '—';
          const url         = process.env.ARTIFACT_URL;
          const name        = process.env.ARTIFACT_NAME;
          const installCmd  = process.env.INSTALL_CMD;
          const branch      = process.env.BRANCH;
          const agent       = process.env.AGENT;
          const passNum     = process.env.PASS_NUM;

          const typeIcon = { patch: '🩹', wheel: '📦', model_ir: '🗜️',
                             override_url: '🔗', analysis: '📄', log: '📋' };
          const icon = typeIcon[type] || '📎';

          let body = `### ${icon} New artifact — \`${component}\` (Pass ${passNum})\n\n`;
          body += `**Agent:** ${agent}  \n`;
          body += `**Type:** \`${type}\`  \n`;
          body += `**Description:** ${description}  \n`;

          if (branch) body += `**Branch:** \`${branch}\`  \n`;
          if (url)    body += `**Download:** [${name || 'artifact'}](${url})  \n`;
          if (installCmd) {
            body += `\n**To apply this fix:**\n\`\`\`bash\n${installCmd}\n\`\`\`\n`;
          }
          body += `\n> Generated by the MEAT pipeline — [workflow run](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID})`;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo:  context.repo.repo,
            issue_number: issueNumber,
            body
          });

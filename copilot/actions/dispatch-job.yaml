name: Dispatch Job
inputs:
  job_id:
    required: true
  ticket:
    required: true

runs:
  using: composite
  steps:
    - name: Dispatch selected job
      uses: actions/github-script@v7
      with:
        script: |
          await github.rest.actions.createWorkflowDispatch({
            owner: context.repo.owner,
            repo: context.repo.repo,
            workflow_id: `${process.env.JOB}.yml`,
            ref: "main",
            inputs: {
              ticket: process.env.TICKET
            }
          })
      env:
        JOB: ${{ inputs.job_id }}
        TICKET: ${{ inputs.ticket }}
